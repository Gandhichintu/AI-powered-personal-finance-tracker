<div id="paymentModal"
 class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">

<div class="bg-white w-full max-w-md rounded-xl p-6 relative">
<button onclick="closePaymentModal()"
 class="absolute right-4 top-4 text-gray-400">✕</button>

<h2 class="text-xl font-semibold mb-4">Add Recurring Payment</h2>

<form method="post" action="{% url 'recurring:add' %}">
{% csrf_token %}

<label>Payment Name</label>
<input class="input" name="name" placeholder="e.g., Netflix Subscription">

<label class="mt-3 block">Amount (₹)</label>
<input class="input" name="amount" placeholder="500">

<label class="mt-3 block">Category</label>
<select name="category" class="input">
  <option value="">Select Category</option>
  <option value="entertainment">Entertainment</option>
  <option value="rent">Rent</option>
  <option value="bills">Bills</option>
  <option value="insurance">Insurance</option>
</select>

<label class="mt-3 block">Frequency</label>
<select name="frequency" class="input">
  <option value="">Select Frequency</option>
  <option value="daily">Daily</option>
  <option value="monthly">Monthly</option>
  <option value="yearly">Yearly</option>
</select>

<label class="mt-3 block">Next Payment Date</label>
<input type="date" name="next_payment_date" class="input">

<button class="w-full mt-5 bg-blue-600 text-white py-2 rounded-lg">
 Save Payment
</button>
</form>
</div>
</div>
