{% extends 'expenses/base.html' %}
{% block content %}
  <div class="bg-white p-6 rounded shadow max-w-2xl">
    <h2 class="text-xl font-semibold">Delete Expense</h2>
    <p class="mt-2">Are you sure you want to delete expense <strong>₹{{ expense.amount }}</strong> on {{ expense.date }}?</p>
    <form method="post" class="mt-4">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Delete</button>
      <a href="{% url 'expenses:expense_list' %}" class="ml-2 text-gray-600">Cancel</a>
    </form>
  </div>
{% endblock %}
