<div id="goalModal"
     class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-md rounded-xl p-6 relative">
    <button onclick="closeGoalModal()"
      class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">✕</button>

    <h2 class="text-xl font-semibold mb-4">Add New Goal</h2>

    <form method="post" action="{% url 'goals:create_goal' %}">
      {% csrf_token %}

      <label class="text-sm">Goal Name</label>
      <input name="name" class="input" placeholder="e.g., Europe Trip">

      <label class="text-sm mt-3 block">Target Amount (₹)</label>
      <input name="target_amount" class="input" placeholder="3000">

      <label class="text-sm mt-3 block">Deadline</label>
      <input type="date" name="deadline" class="input">

      <button class="w-full mt-5 bg-blue-600 text-white py-2 rounded-lg">
        Create Goal
      </button>
    </form>
  </div>
</div>

<style>
.input {
  width: 100%;
  border: 1px solid #e5e7eb;
  padding: 10px;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
