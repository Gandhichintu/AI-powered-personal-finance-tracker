<div id="depositModal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-xl p-6 relative m-4">
        <button onclick="closeDepositModal()" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">✕</button>
        
        <h2 class="text-xl font-semibold mb-4">Add Deposit</h2>
        <p class="text-gray-600 mb-4">Goal: <span id="depositGoalName" class="font-semibold"></span></p>
        
        <form method="post" action="" id="depositForm">
            {% csrf_token %}
            <input type="hidden" name="goal_id" id="depositGoalId">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount (₹)</label>
                <input type="number" name="amount" step="0.01" min="0.01" 
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter amount" required>
            </div>
            
            <div class="flex gap-3">
                <button type="button" onclick="closeDepositModal()"
                    class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50">
                    Cancel
                </button>
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                    Add Deposit
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Set form action dynamically
document.addEventListener('DOMContentLoaded', function() {
    const depositForm = document.getElementById('depositForm');
    const depositGoalId = document.getElementById('depositGoalId');
    
    depositForm.addEventListener('submit', function(e) {
        const goalId = depositGoalId.value;
        this.action = `/goals/${goalId}/deposit/`;
    });
});
</script>
