<div id="editGoalModal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-xl p-6 relative m-4">
        <button onclick="closeEditGoalModal()" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">✕</button>
        
        <h2 class="text-xl font-semibold mb-4">Edit Goal</h2>
        
        <form method="post" action="" id="editGoalForm">
            {% csrf_token %}
            <input type="hidden" name="goal_id" id="editGoalId">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Goal Name</label>
                    <input type="text" name="name" id="editGoalName"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Goal name" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Target Amount (₹)</label>
                    <input type="number" name="target_amount" id="editTargetAmount" step="0.01" min="0.01"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Target amount" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Deadline</label>
                    <input type="date" name="deadline" id="editDeadline"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           required>
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeEditGoalModal()"
                    class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50">
                    Cancel
                </button>
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Set form action dynamically
document.addEventListener('DOMContentLoaded', function() {
    const editGoalForm = document.getElementById('editGoalForm');
    const editGoalId = document.getElementById('editGoalId');
    
    editGoalForm.addEventListener('submit', function(e) {
        const goalId = editGoalId.value;
        this.action = `/goals/${goalId}/edit/`;
    });
});
</script>
