<!-- templates/registration/login.html -->
{% extends 'expenses/base.html' %}
{% load static %}

{% block title %}Login - FinanceTracker{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg text-sm">
            Invalid username or password. Please try again.
        </div>
        {% endif %}
        
        <div>
            <label class="block text-gray-700 font-medium mb-2">Username</label>
            <input type="text" name="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-purple-500" required>
        </div>
        
        <div>
            <label class="block text-gray-700 font-medium mb-2">Password</label>
            <input type="password" name="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-purple-500" required>
        </div>
        
        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-2 rounded-lg font-semibold hover:opacity-90 transition">
            Login
        </button>
    </form>
    
    <p class="mt-4 text-center text-gray-600">
        Don't have an account? 
        <a href="{% url 'accounts:register' %}" class="text-purple-600 hover:text-purple-700 font-medium">Create one here</a>
    </p>
</div>
{% endblock %}
