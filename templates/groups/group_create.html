{% extends 'expenses/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-semibold mb-4">Create New Group</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                Group Name
            </label>
            <input 
                type="text" 
                name="name" 
                id="name"
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                placeholder="e.g., Roommates, Family Trip, Office Team"
                required
            >
        </div>
        
        <div class="flex items-center justify-between">
            <button 
                type="submit" 
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            >
                Create Group
            </button>
            <a 
                href="{% url 'groups:group_list' %}" 
                class="inline-block align-baseline font-bold text-sm text-gray-500 hover:text-gray-800"
            >
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
